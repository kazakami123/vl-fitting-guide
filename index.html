<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fitting Guide">
<meta name="theme-color" content="#1A1A2E">
<link rel="manifest" href="./manifest.json">
<title>VISUAL LABO フィッティングガイド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #FAF7F2;
  --surface: #FFFFFF;
  --navy:    #1A1A2E;
  --gold:    #C8956A;
  --gold-lt: #E8C9A8;
  --slate:   #4A4A6A;
  --text:    #2C2C2C;
  --text-lt: #7A7A8A;
  --border:  #E5DDD4;
  --ok:      #2D6A4F;
  --ng:      #9B2226;
  --warn:    #B5541A;
  --cream:   #F5F0EA;
  --inset:   env(safe-area-inset-bottom, 0px);
  --ff-disp: 'Cormorant Garamond', 'Hiragino Mincho ProN', serif;
  --ff-body: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
}

html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--ff-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ── App Shell ── */
#app { display: flex; flex-direction: column; height: 100dvh; }

/* ── Header ── */
.app-header {
  background: var(--navy);
  color: white;
  padding: 0 1rem;
  padding-top: calc(env(safe-area-inset-top, 0px) + 0.75rem);
  padding-bottom: 0.75rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.app-header .back-btn {
  width: 36px; height: 36px;
  border: none; background: rgba(255,255,255,0.12);
  border-radius: 50%; color: white;
  font-size: 1.1rem; cursor: pointer;
  display: none; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.app-header .back-btn.show { display: flex; }
.app-header .title-wrap { flex: 1; min-width: 0; }
.app-header .brand {
  font-family: var(--ff-disp);
  font-size: 0.65rem;
  letter-spacing: 0.18em;
  color: var(--gold-lt);
  text-transform: uppercase;
}
.app-header h1 {
  font-size: 1rem;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
}
.search-btn {
  width: 36px; height: 36px;
  border: none; background: rgba(255,255,255,0.12);
  border-radius: 50%; color: white;
  font-size: 1.1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* ── Search Bar ── */
.search-bar {
  background: var(--navy);
  padding: 0 1rem 0.75rem;
  display: none;
}
.search-bar.show { display: block; }
.search-bar input {
  width: 100%;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 999px;
  color: white;
  font-family: var(--ff-body);
  font-size: 0.9rem;
  padding: 0.5rem 1rem;
  outline: none;
}
.search-bar input::placeholder { color: rgba(255,255,255,0.4); }

/* ── Main Content ── */
.main-content {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding-bottom: calc(4rem + var(--inset));
}

/* ── Bottom Nav ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--navy);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  padding-bottom: var(--inset);
  z-index: 100;
  box-shadow: 0 -2px 20px rgba(0,0,0,0.25);
}
.nav-btn {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0.2rem;
  padding: 0.65rem 0;
  border: none; background: none; cursor: pointer;
  color: rgba(255,255,255,0.45);
  transition: color 0.2s;
  position: relative;
}
.nav-btn.active { color: var(--gold); }
.nav-btn .icon { font-size: 1.25rem; line-height: 1; }
.nav-btn .label { font-size: 0.6rem; font-family: var(--ff-body); letter-spacing: 0.03em; }
.nav-btn.active::after {
  content: '';
  position: absolute;
  top: 0; left: 25%; right: 25%;
  height: 2px;
  background: var(--gold);
  border-radius: 0 0 2px 2px;
}

/* ── Pages ── */
.page { display: none; }
.page.active { display: block; }

/* ── Home Page ── */
.home-hero {
  background: var(--navy);
  color: white;
  padding: 2rem 1.25rem 1.5rem;
  text-align: center;
}
.home-hero .hero-icon {
  font-family: var(--ff-disp);
  font-size: 3.5rem;
  color: var(--gold);
  line-height: 1;
  margin-bottom: 0.5rem;
}
.home-hero p {
  font-size: 0.78rem;
  color: rgba(255,255,255,0.55);
  letter-spacing: 0.06em;
}

.chapter-grid {
  padding: 1.25rem;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}
.chapter-card {
  background: var(--surface);
  border-radius: 12px;
  padding: 1rem 1.1rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  -webkit-tap-highlight-color: transparent;
}
.chapter-card:active { transform: scale(0.98); }
.chapter-num {
  width: 42px; height: 42px;
  background: var(--navy);
  color: var(--gold);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--ff-disp);
  font-size: 1.1rem;
  font-weight: 600;
  flex-shrink: 0;
}
.chapter-info { flex: 1; min-width: 0; }
.chapter-info .chapter-title {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--navy);
  line-height: 1.3;
}
.chapter-info .chapter-sub {
  font-size: 0.72rem;
  color: var(--text-lt);
  margin-top: 0.15rem;
}
.chapter-arrow { color: var(--gold); font-size: 0.9rem; flex-shrink: 0; }

/* ── Chapter Detail ── */
.detail-content {
  padding: 1.25rem;
}

.section-block {
  margin-bottom: 1.75rem;
}
.section-h2 {
  font-size: 1rem;
  font-weight: 700;
  color: var(--navy);
  padding-bottom: 0.5rem;
  border-bottom: 2px solid var(--gold);
  margin-bottom: 1rem;
}
.section-h3 {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--slate);
  margin-bottom: 0.5rem;
  margin-top: 0.75rem;
}
.body-text {
  font-size: 0.85rem;
  line-height: 1.75;
  color: var(--text);
  margin-bottom: 0.5rem;
}

/* Step card */
.step-card {
  background: var(--surface);
  border-radius: 12px;
  border: 1px solid var(--border);
  margin-bottom: 1rem;
  overflow: hidden;
}
.step-header {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.85rem 1rem;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  background: var(--surface);
  transition: background 0.15s;
}
.step-header:active { background: var(--cream); }
.step-num {
  width: 34px; height: 34px;
  background: var(--navy);
  color: var(--gold);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.8rem; font-weight: 700;
  flex-shrink: 0;
}
.step-title { flex: 1; font-size: 0.88rem; font-weight: 700; color: var(--navy); line-height: 1.3; }
.step-toggle { color: var(--gold); font-size: 0.8rem; flex-shrink: 0; transition: transform 0.25s ease; }
.step-toggle.open { transform: rotate(180deg); }
.step-body {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 0.3s ease;
  background: #FDFCFA;
  border-top: 1px solid var(--border);
}
.step-body.open { grid-template-rows: 1fr; }
.step-inner { overflow: hidden; }
.step-content { padding: 0.9rem 1rem 1rem; }

.purpose-tag {
  display: inline-flex; align-items: center; gap: 0.3rem;
  background: rgba(200,149,106,0.1);
  color: var(--warn);
  border-radius: 999px;
  padding: 0.2rem 0.6rem;
  font-size: 0.72rem;
  font-weight: 700;
  margin-bottom: 0.65rem;
}

.check-list, .bullet-list { list-style: none; margin-bottom: 0.75rem; }
.check-list li, .bullet-list li {
  display: flex; align-items: flex-start; gap: 0.5rem;
  font-size: 0.82rem;
  color: var(--text);
  line-height: 1.6;
  padding: 0.2rem 0;
}
.check-list li::before { content: '✓'; color: var(--ok); font-weight: 700; flex-shrink: 0; margin-top: 0.05rem; }
.bullet-list li::before { content: '▸'; color: var(--gold); flex-shrink: 0; margin-top: 0.05rem; }

.quote-block {
  background: rgba(26,26,46,0.04);
  border-left: 3px solid var(--gold);
  padding: 0.65rem 0.85rem;
  margin: 0.5rem 0;
  border-radius: 0 8px 8px 0;
}
.quote-block .label { font-size: 0.68rem; color: var(--gold); font-weight: 700; margin-bottom: 0.2rem; }
.quote-block p { font-size: 0.82rem; color: var(--slate); font-style: italic; line-height: 1.6; }

.note-block {
  background: rgba(181,84,26,0.06);
  border: 1px solid rgba(181,84,26,0.2);
  border-radius: 8px;
  padding: 0.6rem 0.8rem;
  margin-top: 0.5rem;
}
.note-block p { font-size: 0.78rem; color: var(--warn); line-height: 1.6; }
.note-block p::before { content: '※ '; font-weight: 700; }

/* Info table */
.info-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
  margin-bottom: 0.75rem;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.info-table th {
  background: var(--navy);
  color: var(--gold-lt);
  padding: 0.55rem 0.75rem;
  text-align: left;
  font-weight: 600;
  font-size: 0.75rem;
}
.info-table td {
  padding: 0.5rem 0.75rem;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.6;
  color: var(--text);
}
.info-table tr:last-child td { border-bottom: none; }
.info-table tr:nth-child(odd) td { background: #FDFCFA; }
.info-table tr:nth-child(even) td { background: var(--cream); }

/* NG/OK table */
.ngok-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.78rem;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
  margin-bottom: 0.75rem;
}
.ngok-table .th-ng { background: #FEF0F0; color: var(--ng); padding: 0.5rem 0.65rem; font-weight: 700; font-size: 0.73rem; }
.ngok-table .th-ok { background: #F0FFF4; color: var(--ok); padding: 0.5rem 0.65rem; font-weight: 700; font-size: 0.73rem; }
.ngok-table td { padding: 0.5rem 0.65rem; border-bottom: 1px solid var(--border); vertical-align: top; line-height: 1.55; }
.ngok-table .td-ng { color: var(--ng); background: #FFF8F8; }
.ngok-table .td-ok { color: var(--ok); background: #F8FFF9; }
.ngok-table tr:last-child td { border-bottom: none; }

/* Failure card */
.failure-card {
  background: var(--surface);
  border-radius: 12px;
  border: 1px solid var(--border);
  margin-bottom: 1rem;
  overflow: hidden;
}
.failure-header {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.85rem 1rem;
  cursor: pointer;
  background: var(--surface);
  -webkit-tap-highlight-color: transparent;
}
.failure-header:active { background: var(--cream); }
.failure-badge {
  background: #FEF0F0;
  color: var(--ng);
  border-radius: 6px;
  padding: 0.2rem 0.45rem;
  font-size: 0.7rem;
  font-weight: 700;
  flex-shrink: 0;
}
.failure-title { flex: 1; font-size: 0.88rem; font-weight: 700; color: var(--navy); }
.failure-body {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 0.3s ease;
  background: #FDFCFA;
  border-top: 1px solid var(--border);
}
.failure-body.open { grid-template-rows: 1fr; }
.failure-inner { overflow: hidden; }
.failure-content { padding: 0.9rem 1rem 1rem; }

.row-ng, .row-ok, .row-why {
  display: flex; gap: 0.4rem;
  font-size: 0.81rem;
  margin-bottom: 0.5rem;
  line-height: 1.6;
}
.row-label {
  font-weight: 700;
  flex-shrink: 0;
  font-size: 0.73rem;
  padding: 0.05rem 0.4rem;
  border-radius: 4px;
  height: fit-content;
  margin-top: 0.15rem;
}
.row-ng .row-label { background: #FEF0F0; color: var(--ng); }
.row-ok .row-label { background: #F0FFF4; color: var(--ok); }
.row-why .row-label { background: #F0F4FF; color: var(--slate); }

/* ── Checklist Page ── */
.checklist-progress {
  background: var(--navy);
  padding: 1.25rem;
  text-align: center;
}
.progress-bar-wrap {
  background: rgba(255,255,255,0.12);
  border-radius: 999px;
  height: 6px;
  margin: 0.75rem 0 0.4rem;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  background: var(--gold);
  border-radius: 999px;
  transition: width 0.4s ease;
  width: 0%;
}
.progress-text { color: rgba(255,255,255,0.7); font-size: 0.78rem; }
.progress-count { color: var(--gold-lt); font-size: 1.3rem; font-weight: 700; }

.checklist-reset {
  display: block;
  margin: 0 1.25rem 0;
  padding: 0.5rem;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  color: rgba(255,255,255,0.6);
  font-family: var(--ff-body);
  font-size: 0.78rem;
  cursor: pointer;
  width: calc(100% - 2.5rem);
  transition: all 0.15s;
}
.checklist-reset:active { background: rgba(255,255,255,0.1); }

.checklist-section { padding: 1rem 1.25rem; }
.cl-section-title {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--text-lt);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 0.6rem;
  margin-top: 0.5rem;
}
.cl-item {
  display: flex; align-items: flex-start; gap: 0.75rem;
  padding: 0.65rem 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.cl-item:last-child { border-bottom: none; }
.cl-checkbox {
  width: 22px; height: 22px;
  border: 2px solid var(--border);
  border-radius: 5px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  margin-top: 0.05rem;
}
.cl-item.checked .cl-checkbox {
  background: var(--ok);
  border-color: var(--ok);
  color: white;
}
.cl-item.checked .cl-checkbox::after { content: '✓'; font-size: 0.75rem; font-weight: 700; }
.cl-text {
  font-size: 0.84rem;
  line-height: 1.6;
  color: var(--text);
  flex: 1;
}
.cl-item.checked .cl-text { color: var(--text-lt); text-decoration: line-through; text-decoration-color: var(--ok); }

/* ── Knowledge Page ── */
.knowledge-nav {
  display: flex;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding: 0.75rem 1.25rem;
  gap: 0.5rem;
}
.knowledge-nav::-webkit-scrollbar { display: none; }
.kn-btn {
  border: 1.5px solid var(--border);
  background: var(--surface);
  border-radius: 999px;
  padding: 0.35rem 0.9rem;
  font-size: 0.78rem;
  font-family: var(--ff-body);
  color: var(--text-lt);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.kn-btn.active {
  background: var(--navy);
  border-color: var(--navy);
  color: var(--gold-lt);
}
.kn-section { display: none; padding: 0 1.25rem 1rem; }
.kn-section.active { display: block; }

/* Principle card */
.principle-card {
  background: var(--surface);
  border-radius: 10px;
  border: 1px solid var(--border);
  padding: 0.85rem 1rem;
  margin-bottom: 0.6rem;
  display: flex;
  gap: 0.75rem;
  align-items: flex-start;
}
.principle-num {
  width: 28px; height: 28px;
  background: var(--gold);
  color: white;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem; font-weight: 700;
  flex-shrink: 0;
}
.principle-text { font-size: 0.85rem; line-height: 1.65; color: var(--text); }

/* Trouble table */
.trouble-card {
  background: var(--surface);
  border-radius: 10px;
  border: 1px solid var(--border);
  overflow: hidden;
  margin-bottom: 0.75rem;
}
.trouble-symptom {
  background: var(--cream);
  padding: 0.6rem 0.85rem;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--navy);
  border-bottom: 1px solid var(--border);
}
.trouble-detail { padding: 0.65rem 0.85rem; }
.trouble-row { display: flex; gap: 0.4rem; margin-bottom: 0.3rem; font-size: 0.8rem; line-height: 1.55; }
.trouble-label { font-weight: 700; color: var(--slate); flex-shrink: 0; }

/* Search results */
.search-results { padding: 1rem 1.25rem; }
.search-result-item {
  background: var(--surface);
  border-radius: 10px;
  border: 1px solid var(--border);
  padding: 0.85rem 1rem;
  margin-bottom: 0.6rem;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.search-result-item:active { background: var(--cream); }
.sr-chapter { font-size: 0.7rem; color: var(--gold); font-weight: 700; margin-bottom: 0.2rem; }
.sr-title { font-size: 0.88rem; font-weight: 700; color: var(--navy); }
.sr-snippet { font-size: 0.78rem; color: var(--text-lt); margin-top: 0.2rem; line-height: 1.5; }
mark { background: rgba(200,149,106,0.25); border-radius: 2px; padding: 0 0.1em; }

/* ── Animations ── */
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.page.active { animation: fadeSlideIn 0.25s ease; }
</style>
</head>

<body>
<div id="app">

  <!-- Header -->
  <header class="app-header">
    <button class="back-btn" id="backBtn" onclick="goBack()">‹</button>
    <div class="title-wrap">
      <div class="brand">VISUAL LABO</div>
      <h1 id="headerTitle">フィッティングガイド</h1>
    </div>
    <button class="search-btn" onclick="toggleSearch()">🔍</button>
  </header>

  <!-- Search Bar -->
  <div class="search-bar" id="searchBar">
    <input type="search" id="searchInput" placeholder="キーワードで検索…" oninput="doSearch(this.value)">
  </div>

  <!-- Main -->
  <main class="main-content">

    <!-- Search Results -->
    <div id="searchResultsPage" style="display:none;">
      <div class="search-results" id="searchResults"></div>
    </div>

    <!-- Page: Home -->
    <div class="page active" id="pageHome">
      <div class="home-hero">
        <div class="hero-icon">V</div>
        <p>FITTING OPERATION MANUAL</p>
      </div>
      <div class="chapter-grid" id="chapterGrid"></div>
    </div>

    <!-- Page: Chapter Detail -->
    <div class="page" id="pageDetail">
      <div class="detail-content" id="detailContent"></div>
    </div>

    <!-- Page: Checklist -->
    <div class="page" id="pageChecklist">
      <div class="checklist-progress">
        <div class="progress-count"><span id="clDone">0</span> / <span id="clTotal">0</span></div>
        <div class="progress-bar-wrap"><div class="progress-bar" id="clBar"></div></div>
        <div class="progress-text">フィッティングチェックリスト</div>
      </div>
      <button class="checklist-reset" onclick="resetChecklist()">✕ リセット</button>
      <div class="checklist-section" id="checklistContent"></div>
    </div>

    <!-- Page: Knowledge -->
    <div class="page" id="pageKnowledge">
      <nav class="knowledge-nav" id="knowledgeNav"></nav>
      <div id="knowledgeContent"></div>
    </div>

  </main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="navHome" onclick="showTab('Home')">
      <span class="icon">📖</span><span class="label">チャプター</span>
    </button>
    <button class="nav-btn" id="navFlow" onclick="showTab('Flow')">
      <span class="icon">▶</span><span class="label">フロー</span>
    </button>
    <button class="nav-btn" id="navChecklist" onclick="showTab('Checklist')">

  try { checkState = JSON.parse(localStorage.getItem('vl_checklist') || '{}'); } catch(e) { checkState = {}; }

function showTab(tab) {
  currentTab = tab;
  hideSearch();
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

  if (tab === 'Home') {
    document.getElementById('pageHome').classList.add('active');
    document.getElementById('navHome').classList.add('active');
    setHeader('フィッティングガイド');
    hideBack();
  } else if (tab === 'Flow') {
    showFlowPage();
  } else if (tab === 'Checklist') {
    document.getElementById('pageChecklist').classList.add('active');
    document.getElementById('navChecklist').classList.add('active');
    setHeader('フィッティングチェックリスト');
    hideBack();
    buildChecklist();
  } else if (tab === 'Knowledge') {
    document.getElementById('pageKnowledge').classList.add('active');
    document.getElementById('navKnowledge').classList.add('active');
    setHeader('フィッティング知識');
    hideBack();
    buildKnowledge();
  }
}

function showChapter(id) {
  currentChapter = id;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('pageDetail').classList.add('active');
  const ch = CHAPTERS.find(c => c.id === id);
  setHeader(ch.title);
  showBack();
  buildDetail(id);
  document.getElementById('pageDetail').querySelector('.detail-content').scrollTop = 0;
  document.querySelector('.main-content').scrollTop = 0;
}

function goBack() {
  showTab(currentTab === 'Home' || currentChapter ? 'Home' : currentTab);
  currentChapter = null;
}

function showFlowPage() {
  document.getElementById('pageDetail').classList.add('active');
  document.getElementById('navFlow').classList.add('active');
  setHeader('フィッティングフロー 全17ステップ');
  hideBack();
  buildFlowPage();
  document.querySelector('.main-content').scrollTop = 0;
}

function setHeader(title) {
  document.getElementById('headerTitle').textContent = title;
}
function showBack() { document.getElementById('backBtn').classList.add('show'); }
function hideBack() { document.getElementById('backBtn').classList.remove('show'); }

function buildDetail(id) {
  const el = document.getElementById('detailContent');
  let html = '';
  if (id === 1) html = buildCh1();
  else if (id === 2) html = buildCh2();
  else if (id === 3) html = buildCh3();
  else if (id === 4) html = buildCh4();
  else if (id === 5) html = buildCh5();
  else if (id === 6) html = buildCh6();
  else if (id === 7) { showTab('Checklist'); return; }
  else if (id === 8) html = buildCh8();
  el.innerHTML = html;
}

      return `<div class="cl-item ${checked}" onclick="toggleCheck('${key}', this)">
        <div class="cl-checkbox"></div>
        <div class="cl-text">${item}</div>
      </div>`;
    }).join('');
    return `<div class="cl-section-title">${sec.section}</div>${items}`;
  }).join('');

  document.getElementById('checklistContent').innerHTML = html;
  document.getElementById('clTotal').textContent = totalItems;
  updateProgress();
}

function toggleCheck(key, el) {
  el.classList.toggle('checked');
  checkState[key] = el.classList.contains('checked');
  saveCheckState();
  updateProgress();
}

function updateProgress() {
  const total = document.querySelectorAll('.cl-item').length;
  const done = document.querySelectorAll('.cl-item.checked').length;
  document.getElementById('clDone').textContent = done;
  document.getElementById('clTotal').textContent = total;
  const pct = total ? (done / total) * 100 : 0;
  document.getElementById('clBar').style.width = pct + '%';
}

function resetChecklist() {
  if (!confirm('チェックリストをリセットしますか？')) return;
  checkState = {};
  saveCheckState();
  document.querySelectorAll('.cl-item').forEach(el => el.classList.remove('checked'));
  updateProgress();
}

const SEARCH_INDEX = [
  ...CHAPTERS.map(c => ({ chapter: `Chapter ${c.id}`, title: c.title, snippet: c.sub, action: () => showChapter(c.id) })),
  ...FITTING_STEPS.map(s => ({ chapter: 'フィッティングフロー', title: `${s.num} ${s.title}`, snippet: s.purpose + ' ' + s.checks.join(' '), action: () => { showTab('Flow'); } })),
  ...FAILURES.map(f => ({ chapter: 'よくある失敗', title: `${f.num} ${f.title}`, snippet: f.ng + ' ' + f.why, action: () => showChapter(5) })),
  ...TROUBLES.map(t => ({ chapter: 'トラブル診断', title: t.symptom, snippet: t.cause + ' → ' + t.action, action: () => showChapter(6) })),
  ...PRINCIPLES.map((p, i) => ({ chapter: 'フィッティング根本思想', title: `原則${i+1}`, snippet: p, action: () => showChapter(1) })),
];

function toggleSearch() {
  searchVisible = !searchVisible;
  document.getElementById('searchBar').classList.toggle('show', searchVisible);
  if (searchVisible) {
    document.getElementById('searchInput').focus();
    document.getElementById('searchInput').value = '';
    document.getElementById('searchResultsPage').style.display = 'none';
  } else {
    document.getElementById('searchResultsPage').style.display = 'none';
  }
}

function hideSearch() {
  searchVisible = false;
  document.getElementById('searchBar').classList.remove('show');
  document.getElementById('searchResultsPage').style.display = 'none';
}

function doSearch(q) {
  const resPage = document.getElementById('searchResultsPage');
  const resEl = document.getElementById('searchResults');
  if (!q.trim()) { resPage.style.display = 'none'; return; }

  const terms = q.toLowerCase().split(/\s+/);
  const results = SEARCH_INDEX.filter(item => {
    const text = (item.title + ' ' + item.snippet + ' ' + item.chapter).toLowerCase();
    return terms.every(t => text.includes(t));
  }).slice(0, 12);

  resPage.style.display = 'block';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

  const highlight = (str) => {
    let s = str;
    terms.forEach(t => {
      const re = new RegExp(`(${t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
      s = s.replace(re, '<mark>$1</mark>');
    });
    return s;
  };

  if (results.length === 0) {
    resEl.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--text-lt);font-size:0.85rem;">「${q}」に一致する結果が見つかりませんでした</div>`;
    return;
  }

  resEl.innerHTML = results.map(r => `
    <div class="search-result-item" onclick="(${r.action.toString()})();hideSearch();">
      <div class="sr-chapter">${r.chapter}</div>
      <div class="sr-title">${highlight(r.title)}</div>
      <div class="sr-snippet">${highlight(r.snippet.slice(0, 80))}…</div>
    </div>`).join('');
}

function toggleAccordion(header) {
  const body = header.nextElementSibling;
  const toggle = header.querySelector('.step-toggle');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  if (toggle) toggle.classList.toggle('open', !isOpen);
}
